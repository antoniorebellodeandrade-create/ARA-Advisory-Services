kind = "web"
previewPath = "/"
title = "ARA Real Estate"
version = "1.0.0"
id = "artifacts/ara-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25414

[services.development]
run = "pnpm --filter @workspace/ara-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ara-website", "run", "build" ]
publicDir = "artifacts/ara-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25414"
BASE_PATH = "/"
